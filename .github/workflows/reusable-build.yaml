name: "Build Contracts"

on:
  workflow_call:
    inputs:
      commit-hash:
        description: "The commit hash to build from"
        type: string
        required: true
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact containing all builds"
        value: ${{ jobs.build.outputs.artifact-name }}
      artifact-path:
        description: "Path of the uploaded artifact containing all builds"
        value: ${{ jobs.build.outputs.artifact-path }}

jobs:
  build:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}
      artifact-path: ${{ steps.set-artifact-name.outputs.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout specific commit
        run: git checkout ${{ inputs.commit-hash }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          targets: wasm32v1-none
          components: rust-src

      - name: Set artifact name
        id: set-artifact-name
        run: |
          echo "name=wasm-builds-${{ inputs.commit-hash }}" >> $GITHUB_OUTPUT
          echo "path=target/wasm32v1-none/release" >> $GITHUB_OUTPUT

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v25.2.0

      - name: Build all contracts
        run: |
          # Build and optimize all contracts
          stellar contract build --optimize

          # Process in the release directory
          cd target/wasm32v1-none/release

          # Remove non-wasm files
          find . -maxdepth 1 -type f ! -name "*.wasm" -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: target/wasm32v1-none/release
          retention-days: 1
